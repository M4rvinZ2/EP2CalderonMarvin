<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador Robot 3D</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0a0f;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      canvas {
        display: block;
      }
      #info-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        background: #fff;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 10px 14px;
        color: #333;
        min-width: 180px;
        font-family: sans-serif;
        font-size: 12px;
      }
      #info-panel h2 {
        font-size: 11px;
        color: #666;
        margin-bottom: 6px;
        font-weight: normal;
      }
      .coord {
        display: flex;
        justify-content: space-between;
        margin: 3px 0;
        font-family: monospace;
        font-size: 12px;
      }
      .coord-label {
        color: #888;
      }
      .coord-value {
        color: #333;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
      }
    }
    </script>
    <div id="canvas-container">
      <div id="info-panel">
        <h2>Efector Final</h2>
        <div class="coord">
          <span class="coord-label">X:</span>
          <span class="coord-value" id="pos-x">0.00</span>
        </div>
        <div class="coord">
          <span class="coord-label">Y:</span>
          <span class="coord-value" id="pos-y">0.00</span>
        </div>
        <div class="coord">
          <span class="coord-label">Z:</span>
          <span class="coord-value" id="pos-z">0.00</span>
        </div>
      </div>
    </div>
    <div id="chart-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;justify-content:center;align-items:center;">
      <div style="background:#fff;border-radius:6px;padding:16px;width:95%;max-width:1050px;position:relative;border:1px solid #ccc;">
        <button id="close-charts" style="position:absolute;top:8px;right:8px;background:#ccc;color:#333;border:none;border-radius:3px;width:24px;height:24px;cursor:pointer;font-size:14px;line-height:24px;text-align:center;z-index:10;">x</button>
        <h3 style="color:#333;margin:0 0 12px 0;text-align:center;font-family:sans-serif;font-size:14px;font-weight:normal;">Trayectorias Cartesianas — xd(t), yd(t), zd(t)</h3>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
          <div style="text-align:center;"><canvas id="chart-x"></canvas></div>
          <div style="text-align:center;"><canvas id="chart-y"></canvas></div>
          <div style="text-align:center;"><canvas id="chart-z"></canvas></div>
        </div>
        <h3 style="color:#333;margin:12px 0 0 0;text-align:center;font-family:sans-serif;font-size:13px;font-weight:normal;">Espacio Articular — q1d(t), q2d(t), q3d(t)</h3>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;">
          <div style="text-align:center;"><canvas id="chart-q1"></canvas></div>
          <div style="text-align:center;"><canvas id="chart-q2"></canvas></div>
          <div style="text-align:center;"><canvas id="chart-q3"></canvas></div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
